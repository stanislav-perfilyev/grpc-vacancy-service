name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Build + Test ─────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test (${{ matrix.compiler }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
          - compiler: clang-16
            cc: clang-16
            cxx: clang++-16

    env:
      CC:  ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.compiler == 'gcc-13' && 'gcc-13 g++-13' || 'clang-16 clang++-16' }} \
            cmake \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc \
            libgtest-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure -j"$(nproc)"

  # ── Static analysis: cppcheck ────────────────────────────────────────────────
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --std=c++17 \
            --suppress=missingInclude \
            --suppress=missingIncludeSystem \
            --suppress=unusedVariable \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=checkersReport \
            --error-exitcode=1 \
            --quiet \
            src/ client/ tests/

  # ── Static analysis: clang-tidy ──────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang-16 clang-tidy-16 \
            cmake \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc

      - name: Configure (generate compile_commands.json)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=clang++-16

      # Generate protobuf headers first so clang-tidy finds them
      - name: Generate protobuf stubs
        run: cmake --build build --target vacancy_proto --parallel

      - name: Run clang-tidy
        run: |
          clang-tidy-16 \
            -p build \
            --config-file=.clang-tidy \
            src/main.cpp \
            src/service_impl.h \
            src/storage.h \
            client/main.cpp

  # ── Static analysis: PVS-Studio ─────────────────────────────────────────────
  pvs-studio:
    name: PVS-Studio
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 \
            cmake \
            libgrpc++-dev \
            libprotobuf-dev \
            protobuf-compiler \
            protobuf-compiler-grpc

      - name: Install PVS-Studio
        run: |
          wget -q -O - https://files.viva64.com/etc/pubkey.txt \
            | sudo gpg --dearmor -o /usr/share/keyrings/pvs-studio-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/pvs-studio-archive-keyring.gpg] \
            https://files.viva64.com/etc/viva64.list stable main" \
            | sudo tee /etc/apt/sources.list.d/viva64.list > /dev/null
          sudo apt-get update -q
          sudo apt-get install -y pvs-studio
          pvs-studio-analyzer credentials PVS-Studio Free FREE-FREE-FREE-FREE

      - name: Configure (generate compile_commands.json)
        env:
          CC:  gcc-13
          CXX: g++-13
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_CXX_COMPILER=g++-13

      - name: Generate protobuf stubs
        run: cmake --build build --target vacancy_proto --parallel

      - name: Analyze
        run: |
          pvs-studio-analyzer analyze \
            -j"$(nproc)" \
            -f build/compile_commands.json \
            -o PVS-Studio.log \
            --exclude-path build/

      - name: Convert report
        run: |
          plog-converter \
            -a GA:1,2 \
            -t errorfile \
            -o pvs-report.txt \
            PVS-Studio.log
          echo "=== PVS-Studio report ==="
          cat pvs-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pvs-studio-report
          path: pvs-report.txt

  # ── Docker build smoke-test ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build --target builder -t grpc-vacancy-builder .
